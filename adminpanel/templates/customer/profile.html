{% extends 'customer/base.html' %}
{% block title %}My Profile — Smart Tailors{% endblock %}

{% block content %}

<div class="page-hero">
    <div class="page-hero-label">Smart Tailors</div>
    <h1>My <em>Profile</em></h1>
    <p>Update your account details and contact information.</p>
</div>

<div style="padding: 56px 0 80px;">
    <div class="container">
        <div style="max-width: 680px; margin: 0 auto;">

            <div class="st-card reveal">
                <div class="section-eyebrow">Account</div>
                <h2 class="section-title" style="margin-bottom:36px;">Profile <em>Details</em></h2>

                <form method="post" class="st-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div style="display:flex;gap:12px;margin-top:12px;padding-top:32px;border-top:1px solid var(--sand);">
                        <button type="submit" class="btn-st">
                            Update Profile
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                        <a href="{% url 'customer_dashboard' %}" class="btn-st btn-st-outline">Back</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

{% endblock %}
