{% extends 'customer/base.html' %}
{% block title %}{{ title }} — Smart Tailors{% endblock %}

{% block content %}

<div style="padding: 56px 0 80px;">
    <div class="container">
        <div style="max-width: 760px; margin: 0 auto;">

            <div class="st-card reveal">
                <div class="section-eyebrow">Smart Tailors</div>
                <h2 class="section-title" style="margin-bottom:36px;">{{ title }}</h2>

                <form method="post" enctype="multipart/form-data" class="st-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div style="display:flex;gap:12px;margin-top:12px;padding-top:32px;border-top:1px solid var(--sand);">
                        <button type="submit" class="btn-st">
                            Save
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                        <a href="javascript:history.back()" class="btn-st btn-st-outline">Back</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

{% endblock %}
